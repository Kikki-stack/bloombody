<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f6efe5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FitLife">
  <title>FitLife - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">🏋️</span>
      <h1>FitLife</h1>
      <p>Your personal fitness & nutrition companion</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="registerTabBtn" onclick="switchTab('register')" disabled title="New account creation is temporarily disabled.">Create Account (Locked)</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div id="loginError" class="error-msg"></div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="handleLogin()">Sign In</button>
      </div>

      <!-- Register Form -->
      <div id="registerForm" style="display:none;">
        <div id="registerError" class="error-msg"></div>
        <div id="registerSuccess" class="success-msg"></div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username (min 3 characters)" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Choose any password" autocomplete="new-password">
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="handleRegister()">Create Account</button>
        <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:14px;">
          Your data stays on your device only.
        </p>
      </div>
    </div>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me').then(r => {
      if (r.ok) window.location.href = '/dashboard';
    });

    function switchTab(tab) {
      if (tab === 'register') {
        showError('loginError', 'New account creation is temporarily disabled.');
        return;
      }
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError(id) {
      document.getElementById(id).classList.remove('show');
    }

    async function handleLogin() {
      hideError('loginError');
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!username || !password) return showError('loginError', 'Please fill in all fields.');

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        window.location.href = '/dashboard';
      } catch (err) {
        showError('loginError', err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleRegister() {
      hideError('registerError');
      document.getElementById('registerSuccess').classList.remove('show');
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!username || !password) return showError('registerError', 'Please fill in all fields.');

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        window.location.href = '/dashboard';
      } catch (err) {
        showError('registerError', err.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const loginVisible = document.getElementById('loginForm').style.display !== 'none';
        if (loginVisible) handleLogin(); else handleRegister();
      }
    });
  </script>
</body>
</html>
