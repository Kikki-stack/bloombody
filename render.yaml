services:
  - type: web
    name: fitlife-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
